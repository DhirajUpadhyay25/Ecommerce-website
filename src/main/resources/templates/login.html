<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="/css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/footer.css">
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">



<!-- Font Awesome (for icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>
<section>
   
 <div class="container">
 <div class="row">
 <div class ="col-md-6">
 <img src="/images/auth2.jpg" alt="imagess" height="600px" width="700px">
 </div>
 <div class ="col-md-6 mt-5">
 
  <div class="login-card mt-5 bg-light">

    <h2 class="text-center mb-4">Login</h2>

    <form action=" " method="post">
      <!-- Email -->
      <div class="form-floating mb-3">
        <input type="email" class="form-control custom-input " id="email" placeholder="Email" required>
        <label for="email">Email address</label>
      </div>

      <!-- Password -->
      <div class="form-floating mb-3 position-relative">
        <input type="password" class="form-control custom-input" id="password" placeholder="Password" >
        <label for="password" >Password</label>

        <!-- Eye Icon -->
        <span class="toggle-password" onclick="togglePassword()">
          <i class="fa fa-eye"></i>
        </span>
      </div>

      <!-- Remember -->
      <div class="d-flex justify-content-between mb-3">
        <div>
          <input type="checkbox"> Remember me
        </div>
        <a href="#" class="forgot-link">Forgot?</a>
      </div>

      <!-- Button -->
      <button type="submit" class="btn login-btn w-100 btn btn-success">Login</button>

      <!-- Signup -->
      <p class="text-center mt-3">
        Don't have an account? <a href="signup" class="signup-link">Sign up</a>
      </p>
    </form>

  </div>
</div>
 
 </div>
 
 
 </div>
 
<!--  Footer  -->
<footer class="footer-section mt-5">
  <div class="container">
    <div class="row text-start">

      <!-- Products -->
      <div class="col-md-3 col-6">
        <h5 class="footer-title">Products</h5>
        <ul class="list-unstyled footer-links">
          <li><a href="#">Jeans</a></li>
          <li><a href="#">T-Shirts</a></li>
          <li><a href="#">Shoes</a></li>
          <li><a href="#">Phones</a></li>
        </ul>
      </div>

      <!-- Network -->
      <div class="col-md-3 col-6">
        <h5 class="footer-title">Network</h5>
        <ul class="list-unstyled footer-links">
          <li><a href="#">Science & Technology</a></li>
          <li><a href="#">Business</a></li>
          <li><a href="#">Professional</a></li>
          <li><a href="#">API</a></li>
        </ul>
      </div>

      <!-- Company -->
      <div class="col-md-3 col-6 mt-4 mt-md-0">
        <h5 class="footer-title">Company</h5>
        <ul class="list-unstyled footer-links">
          <li><a href="#">About</a></li>
          <li><a href="#">Legal</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </div>

      <!-- Social -->
      <div class="col-md-3 col-6 mt-4 mt-md-0">
        <h5 class="footer-title">Follow Us</h5>
        <div class="social-icons">
          <a href="https://www.facebook.com/"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
        
      </div>

    </div>
    <div class="footer-bottom text-center ">
     ©2026 DressUp. All Rights Reserved.
</div>
  </div>
  </footer>
 
 
 
 
 
 
 
 <script>
function togglePassword() {
  const password = document.getElementById("password");
  const icon = document.querySelector(".toggle-password i");

  if (password.type === "password") {
    password.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    password.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>



</section>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/footer.css">
<!-- Bootstrap CSS -->
<style>
    body {
      background: #f5f7fa;
    }

    .form-card {
      width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .submit-btn {
      background: linear-gradient(135deg, #4a6cf7, #3b5bdb);
      color: #fff;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74,108,247,0.4);
    }
  </style>
</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>
<section>

<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 form-card">

<div class="bg-light">
    <h4 class="text-center mb-4 mt-4">Add Product</h4>
     <th:block th:if="${session.succMsg}">
                <p class="text-success fw-bold text-center">[[${session.succMsg}]]</p>
                <th:block  th:text= "${@removeSessionc.removesession()}"></th:block>
                </th:block>
                  <th:block th:if = "${session.errorMsg}">
                <p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
                 <th:block  th:text = "${@removeSessionc.removesession()}"></th:block>
                
                </th:block></div>

    <form action="/saveProduct" method="post" enctype="multipart/form-data">
    
     <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control" placeholder="Enter Product Name" name="name">
      </div>
 
      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Enter Description</label>
        <textarea class="form-control" rows="2"cols="" placeholder="Enter Description" name="description"></textarea>
      </div>

      <!-- Category -->
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-control" name="category">
         <option th:each="c:${categories}"> [[${c.name}]]</option>
        </select>
      </div>

      <!-- Price -->
      <div class="mb-3">
        <label class="form-label">Enter Price</label>
        <input type="number" class="form-control" placeholder="Enter Price" name="price">
      </div>

      <!-- Status -->
      <div class="mb-3">
        <label class="form-label">Status</label><br>
        <input type="radio" name="status" value="true" checked> Active
        <input type="radio" name="status"  value="false"class="ms-3"> Inactive
      </div>

      <!-- Stock + Image -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Enter Stock</label>
          <input type="text" class="form-control" placeholder="Stock" name="stock">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Upload Image</label>
          <input type="file" class="form-control" name =imgFile>
        </div>
      </div>

      <!-- Button -->
      <button type="submit" class=" btn btn-success w-100">
        Submit
      </button>
     <a href="/List_products" class=" mt-2 btn btn-primary w-100 text-decoration-none">  View Products </a>
    </form>

  </div>
</div>

</section>
</body>

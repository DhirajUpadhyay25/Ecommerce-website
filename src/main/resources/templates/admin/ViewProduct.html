<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>

<!-- RIGHT: TABLE -->
  <h2 class="text-center">Product Details</h2>

        <div class=" text-center card  container table-box">
             <a href="/admin/addProduct" class=" mt-2 btn btn-success w-50  text-decoration-none"> Add Products </a>
        
        
                <table class="table table-striped table-hover mt-3 text-center align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Description</th>
                            <th>category</th>
                            <th>image</th>
                             <th>status</th>
                            <th>price</th>
                            <th>Quantity</th>
                             <th>Action</th>
                            
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr th:each="product, p:${products}">
                        <th scope="row">[[${product.id}]]</th>
                        <td> [[${product.name}]]</td>
                        <td> [[${product.description}]]</td>
                        <td> [[${product.category}]]</td>
                         <td>
                     <img th:src="@{'/product_img/' + ${product.image}}"
                     style="width:80px; height:80px">
                   </td>
                        <td> [[${product.status}]]</td>
                         <td> [[${product.price}]]</td>
                         <td> [[${product.stock}]]</td>
                   
              <td>
                 <a th:href="@{/updateProduct/{id}(id=${product.id})}" 
                   class="btn btn-primary btn-sm">Edit</a>
                   <a th:href="@{/delete_products/{id}(id=${product.id})}" 
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
              </tr>
                    
               </tbody>
                </table>
              <p>Total Products: <span th:text="${totalProducts}"></span></p> 
</div>
</body>
</html>

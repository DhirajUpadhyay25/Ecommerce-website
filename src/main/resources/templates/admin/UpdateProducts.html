<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/footer.css">
<!-- Bootstrap CSS -->
<style>
    body {
      background: #f5f7fa;
    }

    .form-card {
      width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .submit-btn {
      background: linear-gradient(135deg, #4a6cf7, #3b5bdb);
      color: #fff;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74,108,247,0.4);
    }
  </style>
</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>
<section>

<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 form-card">

    <div class="bg-light">
    <h4 class="text-center mb-4 mt-4">Add Product</h4>
    </div>

    <form th:action="@{/saveProduct}" th:object="${prod}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">ID
            <input type="hidden" th:field="*{id}" class="form-control" > </label>
           <h6 th:text="*{id}"></h6>
        </div>
     <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-control" placeholder="Enter Product Name" th:field="*{name}">
      </div>
 
      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Enter Description</label>
        <textarea class="form-control" rows="2"cols="" placeholder="Enter Description" th:field="*{description}"></textarea>
      </div>

      <!-- Category -->
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-control" th:field="*{category}">
     <option value="">--Select Category--</option>
     <option th:each="c : ${prod.category}" 
            th:value="${c}" 
            th:text="${c}" selected>
           <option th:each="p:${categories}" th:value="${p.name}" th:text="${p.name}" > [[${p.name}]]</option>
                                            
     </select>
    
      </div>

      <!-- Price -->
      <div class="mb-3">
        <label class="form-label">Enter Price</label>
        <input type="number" class="form-control" placeholder="Enter Price"  th:field="*{price}">
      </div>

      <!-- Status -->
      <div class="mb-3">
        <label class="form-label">Status</label><br>
       <input type="radio" th:field="*{status}" value="true"> Active
      <input type="radio" th:field="*{status}" value="false" class="ms-3"> Inactive
      </div>

      <!-- Stock + Image -->
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Enter Stock</label>
          <input type="text" class="form-control" placeholder="Stock" th:field="*{stock}">
        </div>

      <div class="col-md-6 mb-3">
  <label class="form-label">Uploaded Image</label>

  <!-- show old image -->
  <img th:src="@{'/product_img/' + ${prod.image}}" width="80" height="80"><br><br>

  <!-- keep old image -->
  <input type="hidden" th:field="*{image}">

  <!-- new upload -->
    <label class="form-label">Upload New Image</label>
  
  <input type="file" class="form-control" name="imgFile">
</div>
</div>
      <!-- Button -->
      <button type="submit" class=" btn btn-success w-100">
        Submit
      </button>

    </form>

  </div>
</div>

</section>

</body>
</html>

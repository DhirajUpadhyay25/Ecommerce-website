<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>
 
<div class="container mt-4">
    <div class="row d-flex justify-content-center">

        <!-- LEFT: ADD CATEGORY -->
        <div class="col-md-4">
         <form action="/saveCategory" method="post" enctype="multipart/form-data">
        
            <div class="card p-3">
            <input type="hidden" name="id" th:value="${category.id}" >
                <h5 class="text-center">Update Cart Data </h5>
                   <div class="mb-3">
                    <label>Enter Category</label>
                    <input type="text" id="categoryInput"  name="name" th:value="${category.name}"  required class="form-control">
                </div>

                <div class="mb-3">
                    <label>Status</label><br>
                    <input type="radio" name="isActive" value="true" th:checked="${category.isActive==true}" > Active
                    <input type="radio" name="isActive" value="false" th:checked="${category.isActive==false}" class="ms-2"> Inactive
                </div>

                <div class="mb-3">
                    <label>Upload Image</label>
                    <input type="file" id="imageInput" name="file" class="form-control">
                </div>
                  <img th:src="@{'/img/' + ${category.imageName}}" 
                     style="width:100px; height:80px">
                     
               <button type="submit" class= "btn btn-primary w-100">Update </button>
            </div>
           </form>
        </div>
         </div>
          </div>
</body>
</html>

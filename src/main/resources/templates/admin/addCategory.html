<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
   <meta charset="UTF-8">
    <title>Category Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }
        .card {
            border-radius: 12px;
        }
        .table img {
            width: 40px;
            height: 40px;
            object-fit: cover;
        }
        .btn-custom {
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div th:replace="~{nav::layout(~{::section})}"></div>
<section>
<div class="container mt-4">
    <div class="row">

        <!-- LEFT: ADD CATEGORY -->
        <div class="col-md-4">
         <form action="/saveCategory" method="post" enctype="multipart/form-data">
        
            <div class="card p-3">
                <h5 class="text-center">Add Category</h5>
                
                <th:block th:if="${session.successMsg}">
                <p class="text-success fw-bold">[[${session.successMsg}]]</p>
                <th:block  th:text= "${@removeSessionc.removesession()}"></th:block>
                </th:block>
                  <th:block th:if = "${session.errorMsg}">
                <p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
                 <th:block  th:text = "${@removeSessionc.removesession()}"></th:block>
                
                </th:block>

                <div class="mb-3">
                    <label>Enter Category</label>
                    <input type="text" id="categoryInput"  name="name" required class="form-control">
                </div>

              <div class="mb-3">
             <label>Status</label><br>
             <input type="radio" name="isActive" value="true" checked> Active
             <input type="radio" name="isActive" value="false" class="ms-2"> Inactive
            </div>

                <div class="mb-3">
                    <label>Upload Image</label>
                    <input type="file" id="imageInput" name="file" class="form-control">
                </div>

           
               <button type="submit" class= "btn btn-success w-100">Save</button>
            </div>
           </form>
        </div>
       

        <!-- RIGHT: TABLE -->
        <div class="col-md-8">
            <div class="card p-3">
                <h5 class="text-center">Category Details</h5>

                <table class="table mt-3 text-center align-middle">
                    <thead>
                        <tr>
                            <th>Sl No</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Image</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                       <tr th:each="cat,c:${Categories}">
                       <th scope="row">[[${c.count}]]</th>
                       <td> [[${cat.name}]]</td>
                        <td> [[${cat.isActive}]]</td>
                     <td>
                 <img th:src="@{'/category_img/' + ${cat.imageName}}"
                  style="width:80px; height:80px">
              </td>
              <td>
                 <a th:href="@{/admin/updateCart/{id}(id=${cat.id})}" 
                   class="btn btn-primary btn-sm">Edit</a>
                   <a th:href="@{/admin/delete/{id}(id=${cat.id})}" 
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
              </tr>
                    
               </tbody>
                </table>

                <p>Total Category : <span id="totalCount">0</span></p>
            </div>
        </div>

    </div>
</div>
</section>
</body>
</html>
